<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>工地智能打卡系统</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', 'Noto Sans Bengali', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 30px;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 1.2rem; font-weight: 600; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .header-actions select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .header-actions select option { color: #000; background: #fff; }
    .header-actions button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-actions button:hover { background: rgba(255,255,255,0.25); }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--primary);
      border-radius: 2px;
    }
    .status-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-light);
      padding: 6px 12px;
      background: #f1f5f9;
      border-radius: 20px;
    }
    .status-dot .dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse 2s infinite; }
    .dot.online { background: var(--success); }
    .dot.offline { background: var(--danger); }
    .dot.gps-active { background: #3b82f6; }
    .dot.gps-inactive { background: #94a3b8; }
    .dot.in-range { background: var(--success); }
    .dot.out-range { background: var(--warning); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .clock-display {
      text-align: center;
      padding: 16px;
      background: #f8fafc;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .clock-date { font-size: 1.1rem; font-weight: 600; color: var(--text); }
    .clock-time { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .btn-group { display: flex; gap: 12px; }
    .btn-group button {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .btn-checkin {
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
      color: #fff;
    }
    .btn-checkout {
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      color: #fff;
    }
    .btn-group button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(40%);
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-light);
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .night-shift-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #92400e;
      margin-bottom: 14px;
    }
    .gps-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .gps-info .coords { font-family: monospace; color: var(--primary); font-size: 0.8rem; }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 12px 24px;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      animation: slideDown 0.3s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 90vw;
      text-align: center;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--primary); }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .record-list { list-style: none; margin: 12px 0; }
    .record-list li {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .checkin-type { color: var(--success); font-weight: 600; }
    .checkout-type { color: var(--danger); font-weight: 600; }
    .next-action {
      text-align: center;
      padding: 8px;
      background: #f0fdf4;
      border-radius: 8px;
      margin: 12px 0;
      font-weight: 500;
    }
    .admin-panel { display: none; border: 2px solid #f59e0b; border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .admin-panel.show { display: block; }
    .admin-header {
      background: #fef3c7;
      padding: 12px 16px;
      font-weight: 600;
      color: #92400e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-body { padding: 16px; background: var(--card-bg); }
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .admin-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .admin-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }
    .item-list { list-style: none; margin-top: 12px; }
    .item-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fafafa;
      font-size: 0.9rem;
    }
    .item-list li .actions { display: flex; gap: 6px; }
    .item-list li .actions button {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .item-list li .actions button.del { color: var(--danger); border-color: #fecaca; }
    .input-group { display: flex; gap: 8px; margin-top: 8px; }
    .input-group input { flex: 1; }
    .input-group button {
      padding: 10px 18px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }
    /* 看板样式 */
    .dashboard-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card .number { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 0.8rem; color: var(--text-light); }
    /* 地图容器 */
    #mapContainer { height: 300px; border-radius: 8px; margin-top: 12px; }
    @media (max-width: 480px) {
      .header h1 { font-size: 1rem; }
      .btn-group button { padding: 12px; font-size: 0.9rem; }
      .form-row { flex-direction: column; gap: 0; }
      .clock-time { font-size: 1.6rem; }
      .dashboard-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="appTitle">🏗️ 工地打卡</h1>
    <div class="header-actions">
      <select id="langSelect" onchange="switchLanguage(this.value)">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
      </select>
      <button id="adminBtn" onclick="toggleAdmin()" data-i18n="admin">⚙️ 管理</button>
    </div>
  </div>

  <div class="container">
    <div class="status-bar">
      <div class="status-dot"><span class="dot" id="netDot"></span><span data-i18n="network">网络</span></div>
      <div class="status-dot"><span class="dot" id="gpsDot"></span><span data-i18n="gpsStatus">GPS</span></div>
      <div class="status-dot"><span class="dot" id="rangeDot"></span><span data-i18n="inRange">范围</span></div>
    </div>

    <div class="clock-display">
      <div class="clock-date" id="clockDate"></div>
      <div class="clock-time" id="clockTime"></div>
    </div>

    <!-- 今日打卡记录 -->
    <div class="card">
      <div class="card-title">📜 <span data-i18n="todayRecords">今日打卡记录</span></div>
      <ul class="record-list" id="recordList"></ul>
      <div class="next-action" id="nextActionHint"></div>
    </div>

    <!-- 动态操作按钮 -->
    <div class="card">
      <div class="btn-group" id="actionButtons"></div>
    </div>

    <!-- 信息表单 -->
    <form id="attendanceForm" class="card" onsubmit="return false;">
      <div class="card-title" data-i18n="formTitle">📋 打卡信息</div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="name">姓名 *</label>
          <input type="text" id="name" required placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label data-i18n="idLast4">准证后四位 *</label>
          <input type="text" id="idLast4" required maxlength="4" pattern="[A-Za-z0-9]{4}" placeholder="最后4位字符">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="trade">工种 *</label>
          <select id="trade" required><option value="">-- 请选择 --</option></select>
        </div>
        <div class="form-group">
          <label data-i18n="workArea">工作区域 *</label>
          <select id="workArea" required><option value="">-- 请选择 --</option></select>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="supervisor">负责督工 *</label>
        <select id="supervisor" required><option value="">-- 请选择 --</option></select>
      </div>
      <div class="form-group">
        <label data-i18n="workContent">工作内容</label>
        <textarea id="workContent" rows="2" placeholder="请输入今日工作内容"></textarea>
      </div>
      <div class="night-shift-toggle">
        <input type="checkbox" id="isNightShift">
        <label for="isNightShift" data-i18n="nightShift">我是晚班人员（20:00-06:00，跨天签到）</label>
      </div>
      <div class="gps-info" id="gpsInfo">
        <span>📍</span>
        <span data-i18n="gpsWaiting">等待GPS定位...</span>
        <span class="coords" id="gpsCoords"></span>
      </div>
    </form>

    <!-- 管理员后台 -->
    <div class="admin-panel" id="adminPanel">
      <div class="admin-header">
        <span>🛠️ <span data-i18n="adminPanel">管理员后台</span></span>
        <button onclick="toggleAdmin()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">✕</button>
      </div>
      <div class="admin-body">
        <div id="adminAuth" style="margin-bottom:16px;">
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="adminPassword">管理员密码</label>
              <input type="password" id="adminPassword" placeholder="输入密码">
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;">
              <button onclick="adminLogin()" style="padding:10px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;">登录</button>
            </div>
          </div>
        </div>
        <div id="adminContent" style="display:none;">
          <div class="admin-tabs">
            <div class="admin-tab active" onclick="switchAdminTab('dashboard')" data-i18n="tabDashboard">📊 看板</div>
            <div class="admin-tab" onclick="switchAdminTab('map')" data-i18n="tabMap">🗺️ 分布图</div>
            <div class="admin-tab" onclick="switchAdminTab('config')" data-i18n="tabConfig">工地配置</div>
            <div class="admin-tab" onclick="switchAdminTab('trade')" data-i18n="tabTrade">工种</div>
            <div class="admin-tab" onclick="switchAdminTab('area')" data-i18n="tabArea">区域</div>
            <div class="admin-tab" onclick="switchAdminTab('supervisor')" data-i18n="tabSupervisor">督工</div>
            <div class="admin-tab" onclick="switchAdminTab('records')" data-i18n="tabRecords">记录</div>
          </div>

          <!-- 数据看板 -->
          <div class="admin-tab-content active" id="tab-dashboard">
            <button onclick="loadDashboard()" style="width:100%;padding:10px;margin-bottom:12px;">🔄 刷新数据</button>
            <div class="dashboard-stats" id="dashboardStats"></div>
          </div>

          <!-- 分布图 -->
          <div class="admin-tab-content" id="tab-map">
            <p style="margin-bottom:8px;font-size:0.85rem;color:var(--text-light);">📍 仅显示今日未闭环人员的最新签到位置</p>
            <button onclick="loadMap()" style="width:100%;padding:10px;margin-bottom:8px;">🔄 刷新地图</button>
            <div id="mapContainer"></div>
          </div>

          <!-- 工地配置 -->
          <div class="admin-tab-content" id="tab-config">
            <div class="form-row"><div class="form-group"><label>工地名称</label><input id="siteName"></div></div>
            <div class="form-row">
              <div class="form-group"><label>中心纬度</label><input id="centerLat" step="any"></div>
              <div class="form-group"><label>中心经度</label><input id="centerLon" step="any"></div>
            </div>
            <div class="form-group"><label>允许半径(米)</label><input id="siteRadius" value="500"></div>
            <button onclick="saveSiteConfig()" style="width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;margin-top:8px;">💾 保存配置</button>
          </div>

          <!-- 列表管理 -->
          <div class="admin-tab-content" id="tab-trade">
            <div class="input-group"><input id="newTrade" placeholder="工种名称"><button onclick="addListItem('trade')">添加</button></div>
            <ul class="item-list" id="tradeList"></ul>
          </div>
          <div class="admin-tab-content" id="tab-area">
            <div class="input-group"><input id="newArea" placeholder="区域名称"><button onclick="addListItem('area')">添加</button></div>
            <ul class="item-list" id="areaList"></ul>
          </div>
          <div class="admin-tab-content" id="tab-supervisor">
            <div class="input-group"><input id="newSupervisor" placeholder="督工姓名"><button onclick="addListItem('supervisor')">添加</button></div>
            <ul class="item-list" id="supervisorList"></ul>
          </div>
          <div class="admin-tab-content" id="tab-records">
            <button onclick="loadAllRecords()" style="width:100%;padding:10px;margin-bottom:12px;">📊 加载打卡记录</button>
            <div id="recordsTable"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

let currentLang = 'zh';
function t(key) { return translations[currentLang]?.[key] || key; }
function detectLanguage() {
  const stored = localStorage.getItem('siteLang');
  if (stored && ['zh','en','bn'].includes(stored)) currentLang = stored;
  else {
    const bl = (navigator.language||'en').split('-')[0];
    currentLang = ['zh','en','bn'].includes(bl) ? bl : 'en';
  }
  document.getElementById('langSelect').value = currentLang;
}
function switchLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('siteLang', lang);
  updateUIText();
  renderAdminLists();
}
function updateUIText() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
    el.textContent = t(el.getAttribute('data-i18n'));
  });
}

// ==================== GPS、时钟、网络 ====================
let gpsLat=null, gpsLon=null, gpsAccuracy=null;
function initGPS() {
  const gpsDot = document.getElementById('gpsDot');
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    gpsLat = pos.coords.latitude;
    gpsLon = pos.coords.longitude;
    gpsAccuracy = pos.coords.accuracy;
    document.getElementById('gpsCoords').textContent = `${gpsLat.toFixed(5)},${gpsLon.toFixed(5)}`;
    document.querySelector('#gpsInfo span:nth-child(2)').textContent = '📍 '+t('gpsReady');
    gpsDot.className = 'dot gps-active';
    updateRangeStatus();
  }, err => {
    gpsDot.className = 'dot gps-inactive';
  }, { enableHighAccuracy: true });
}
function haversineDistance(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function updateRangeStatus() {
  const dot = document.getElementById('rangeDot');
  if (!gpsLat || !siteConfig.centerLat) { dot.className='dot out-range'; return; }
  const d = haversineDistance(siteConfig.centerLat, siteConfig.centerLon, gpsLat, gpsLon);
  dot.className = d <= siteConfig.radius ? 'dot in-range' : 'dot out-range';
}
function startClock() {
  const update = () => {
    const now = new Date();
    document.getElementById('clockDate').textContent = now.toLocaleDateString(currentLang==='zh'?'zh-CN':currentLang==='bn'?'bn-BD':'en-SG', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
    document.getElementById('clockTime').textContent = now.toLocaleTimeString(currentLang==='zh'?'zh-CN':'en-SG', {hour12:false});
  };
  update(); setInterval(update,1000);
}
window.addEventListener('online', ()=>document.getElementById('netDot').className='dot online');
window.addEventListener('offline', ()=>document.getElementById('netDot').className='dot offline');

// ==================== 配置加载 ====================
let siteConfig = { centerLat:null, centerLon:null, radius:500 };
let trades=[], areas=[], supervisors=[];
async function loadConfig() {
  try {
    const r = await fetch(`${GAS_WEBAPP_URL}?action=getConfig`);
    const d = await r.json();
    if (d.success) {
      siteConfig = d.siteConfig||{};
      trades = d.trades||[]; areas = d.areas||[]; supervisors = d.supervisors||[];
      populateSelects();
      renderAdminLists();
    }
  } catch(e) { console.warn(e); }
}
function populateSelects() {
  ['trade','workArea','supervisor'].forEach(id => {
    const list = id==='trade'?trades:id==='workArea'?areas:supervisors;
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">-- ${t('formTitle')} --</option>`;
    list.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  });
}
setInterval(loadConfig, 10000);

// ==================== 今日打卡记录 ====================
let todayRecords = [];
let lastActionType = null;
function getTodayStr() {
  const d=new Date(); return `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
}
async function loadTodayRecords() {
  const id4 = document.getElementById('idLast4').value.trim();
  if (!id4) return;
  try {
    const r = await fetch(`${GAS_WEBAPP_URL}?action=getTodayRecords&date=${getTodayStr()}&idLast4=${id4}`);
    const d = await r.json();
    if (d.success) {
      todayRecords = d.records||[];
      lastActionType = todayRecords.length ? todayRecords[todayRecords.length-1].type : null;
      renderRecordList();
      renderActionButtons();
    }
  } catch(e) {}
}
function renderRecordList() {
  const list = document.getElementById('recordList');
  list.innerHTML = todayRecords.map(r => `<li>
    <span class="${r.type==='checkin'?'checkin-type':'checkout-type'}">${r.type==='checkin'?'📥 签到':'📤 签退'}</span>
    <span>${r.time}</span></li>`).join('');
  document.getElementById('nextActionHint').textContent = lastActionType==='checkin' ? t('nextCheckout') : t('nextCheckin');
}
function renderActionButtons() {
  const btn = document.getElementById('actionButtons');
  if (lastActionType === 'checkin') {
    btn.innerHTML = `<button class="btn-checkout" onclick="doCheckOut()">📤 ${t('checkout')}</button>`;
  } else {
    btn.innerHTML = `<button class="btn-checkin" onclick="doCheckIn()">📥 ${t('checkin')}</button>`;
  }
}

// ==================== 打卡操作 ====================
async function doCheckIn() { await submitAttendance('checkin'); }
async function doCheckOut() { await submitAttendance('checkout'); }
function getCachedName(id4) {
  const map = JSON.parse(localStorage.getItem('nameCache')||'{}');
  return map[id4] || '';
}
function setCachedName(id4, name) {
  const map = JSON.parse(localStorage.getItem('nameCache')||'{}');
  map[id4] = name;
  localStorage.setItem('nameCache', JSON.stringify(map));
}
async function submitAttendance(type) {
  if (!gpsLat || !gpsLon) return showToast(t('error'), t('locationRequired'), 'error');
  const name = document.getElementById('name').value.trim();
  const id4 = document.getElementById('idLast4').value.trim().toUpperCase();
  if (!name||!id4||!document.getElementById('trade').value||!document.getElementById('workArea').value||!document.getElementById('supervisor').value)
    return showToast(t('error'), t('formIncomplete'), 'error');

  const payload = {
    action: type, date: getTodayStr(),
    name, idLast4: id4, type, latitude: gpsLat, longitude: gpsLon,
    trade: document.getElementById('trade').value,
    workArea: document.getElementById('workArea').value,
    supervisor: document.getElementById('supervisor').value,
    workContent: document.getElementById('workContent').value.trim(),
    isNightShift: document.getElementById('isNightShift').checked,
    deviceId: getDeviceId()
  };
  try {
    const r = await fetch(GAS_WEBAPP_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const d = await r.json();
    if (d.success) {
      showToast(t('success'), type==='checkin'?t('checkinSuccess'):t('checkoutSuccess'), 'success');
      setCachedName(id4, name);
      localStorage.setItem('lastUser', JSON.stringify({name,id4}));
      await loadTodayRecords();
    } else showToast(t('error'), d.message, 'error');
  } catch(e) {
    saveOffline(payload);
    showToast(t('info'), '离线保存，恢复后同步', 'info');
  }
}
function getDeviceId() {
  let id = localStorage.getItem('deviceId');
  if (!id) { id = 'dev_'+Date.now()+Math.random().toString(36).substr(2,9); localStorage.setItem('deviceId',id); }
  return id;
}
function saveOffline(p) {
  const q = JSON.parse(localStorage.getItem('offlineQueue')||'[]');
  q.push(p); localStorage.setItem('offlineQueue', JSON.stringify(q));
}

// ==================== 管理员后台 ====================
let isAdminLoggedIn = false;
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  panel.classList.toggle('show');
  if (!panel.classList.contains('show')) {
    isAdminLoggedIn = false;
    document.getElementById('adminContent').style.display = 'none';
  }
}
function adminLogin() {
  if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
    isAdminLoggedIn = true;
    document.getElementById('adminAuth').style.display='none';
    document.getElementById('adminContent').style.display='block';
    renderAdminLists();
  } else showToast(t('error'), '密码错误', 'error');
}
function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.admin-tab-content').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  // 初始化地图容器（如果切换到地图tab）
  if (tab === 'map') {
    setTimeout(initMap, 100); // 等待DOM显示后再初始化
  }
}

// ==================== 数据看板 ====================

// ==================== 地图分布 ====================
let map = null;
function initMap() {
  if (map) { map.remove(); map = null; }
  const container = document.getElementById('mapContainer');
  if (!container || container.offsetParent === null) return; // 不可见时跳过
  
  map = L.map('mapContainer').setView([1.35, 103.8], 13); // 默认新加坡中心
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);
  
  loadMap();
}

async function loadMap() {
  if (!map) return;
  try {
    const r = await fetch(`${GAS_WEBAPP_URL}?action=getMapData&password=${ADMIN_PASSWORD}`);
    const d = await r.json();
    if (d.success) {
      // 清除旧标记
      map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });
      
      const points = d.points;
      if (points.length === 0) return;
      
      // 添加新标记
      const bounds = [];
      points.forEach(p => {
        if (p.lat && p.lon) {
          const marker = L.marker([p.lat, p.lon]).addTo(map);
          marker.bindPopup(`<b>${p.name}</b> (${p.idLast4})<br>${p.time} ${p.trade||''} ${p.area||''}`);
          bounds.push([p.lat, p.lon]);
        }
      });
      
      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50] });
      }
    }
  } catch(e) { showToast(t('error'), e.message, 'error'); }
}

// ==================== 原有管理员功能 ====================
async function saveSiteConfig() {
  const payload = {
    action:'updateSiteConfig',
    siteName: document.getElementById('siteName').value,
    centerLat: parseFloat(document.getElementById('centerLat').value),
    centerLon: parseFloat(document.getElementById('centerLon').value),
    radius: parseInt(document.getElementById('siteRadius').value)||500
  };
  await fetch(GAS_WEBAPP_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  loadConfig(); showToast(t('success'), '已保存', 'success');
}
async function addListItem(type) {
  const map = { trade:['newTrade','addTrade'], area:['newArea','addArea'], supervisor:['newSupervisor','addSupervisor'] };
  const name = document.getElementById(map[type][0]).value.trim();
  if (!name) return;
  await fetch(GAS_WEBAPP_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:map[type][1],name})});
  document.getElementById(map[type][0]).value='';
  loadConfig();
}
async function deleteListItem(type,name) {
  if (!confirm(t('confirmDelete'))) return;
  const actions = { trade:'deleteTrade', area:'deleteArea', supervisor:'deleteSupervisor' };
  await fetch(GAS_WEBAPP_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:actions[type],name})});
  loadConfig();
}
function renderAdminLists() {
  if (!isAdminLoggedIn) return;
  ['tradeList','areaList','supervisorList'].forEach((id,i) => {
    const list = i===0?trades:i===1?areas:supervisors;
    const type = i===0?'trade':i===1?'area':'supervisor';
    document.getElementById(id).innerHTML = list.map(v => `<li><span>${v}</span>
      <div class="actions"><button onclick="editItem('${type}','${v}')">✏️</button>
      <button class="del" onclick="deleteListItem('${type}','${v}')">🗑️</button></div></li>`).join('');
  });
}
function editItem(type,old) {
  const n = prompt('编辑',old); if (!n||n===old) return;
  const acts = { trade:'updateTrade', area:'updateArea', supervisor:'updateSupervisor' };
  fetch(GAS_WEBAPP_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:acts[type],oldName:old,newName:n})}).then(()=>loadConfig());
}
async function loadAllRecords() {
  const r = await fetch(`${GAS_WEBAPP_URL}?action=getAllRecords&password=${ADMIN_PASSWORD}`);
  const d = await r.json();
  const div = document.getElementById('recordsTable');
  if (d.success) {
    let html = '<table style="width:100%;font-size:0.8rem;border-collapse:collapse;">';
    html += '<tr style="background:#f1f5f9"><th>日期</th><th>时间</th><th>姓名</th><th>类型</th></tr>';
    d.records.forEach(r => html += `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.name}(${r.idLast4})</td><td>${r.type}</td></tr>`);
    html += '</table>'; div.innerHTML = html;
  }
}

// ==================== Toast ====================
function showToast(title, msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = `${title}: ${msg}`;
  t.className = `toast ${type}`; t.style.display='block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', 3500);
}

// ==================== 初始化 ====================
(async function init(){
  detectLanguage();
  updateUIText();
  startClock();
  initGPS();
  await loadConfig();
  
  // 自动填充缓存信息
  document.getElementById('idLast4').addEventListener('input', function(e) {
    const id4 = e.target.value.trim().toUpperCase();
    const cached = getCachedName(id4);
    if (cached) document.getElementById('name').value = cached;
  });
  
  const last = JSON.parse(localStorage.getItem('lastUser')||'{}');
  if (last.id4) {
    document.getElementById('idLast4').value = last.id4;
    document.getElementById('name').value = last.name || getCachedName(last.id4);
  }
  
  await loadTodayRecords();
  setInterval(loadConfig, 10000);
  setInterval(loadTodayRecords, 30000);
})();
